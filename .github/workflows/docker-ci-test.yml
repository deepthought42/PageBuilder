name: Test

on:
  pull_request:
    branches:
      - master
    types: [opened, synchronize, reopened]

jobs:
  test:
    runs-on: ubuntu-latest
    # This job runs on PR creation and updates
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Resolve core version
        id: core_version
        run: echo "LOOKSEE_CORE_VERSION=$(mvn help:evaluate -Dexpression=looksee-core.version -q -DforceStdout)" >> "$GITHUB_ENV"

      - name: Download core JAR
        run: bash scripts/download-core.sh "${LOOKSEE_CORE_VERSION}"

      - name: Install core JAR
        run: mvn install:install-file -Dfile=libs/core-${LOOKSEE_CORE_VERSION}.jar -DgroupId=com.looksee -DartifactId=core -Dversion=${LOOKSEE_CORE_VERSION} -Dpackaging=jar

      - name: Test with Maven
        run: mvn test

  build:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Resolve core version
        run: echo "LOOKSEE_CORE_VERSION=$(sed -n 's:.*<looksee-core.version>\(.*\)</looksee-core.version>.*:\1:p' pom.xml | head -n1)" >> "$GITHUB_ENV"

      - name: Generate Docker-safe image tag
        run: |
          RAW_TAG="${{ github.head_ref }}"
          SAFE_TAG="$(echo "${RAW_TAG}" | tr '[:upper:]' '[:lower:]' | sed 's#[^a-z0-9_.-]#-#g' | sed 's#-\{2,\}#-#g' | sed 's#^[.-]*##; s#[.-]*$##')"
          if [ -z "${SAFE_TAG}" ]; then
            SAFE_TAG="pr-${{ github.event.pull_request.number }}"
          fi
          echo "IMAGE_TAG=${SAFE_TAG}" >> "$GITHUB_ENV"

      - name: Build Docker image
        run: |
          docker build --build-arg LOOKSEE_CORE_VERSION=${LOOKSEE_CORE_VERSION} -t deepthought42/page-builder:${{ env.IMAGE_TAG }} .
          docker tag deepthought42/page-builder:${{ env.IMAGE_TAG }} deepthought42/page-builder:latest
