name: Test

on:
  pull_request:
    branches:
      - master
    types: [opened, synchronize, reopened]

jobs:
  test:
    runs-on: ubuntu-latest
    # This job runs on PR creation and updates
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Resolve core version
        id: core_version
        run: echo "LOOKSEE_CORE_VERSION=$(mvn help:evaluate -Dexpression=looksee-core.version -q -DforceStdout)" >> "$GITHUB_ENV"

      - name: Download core JAR
        run: bash scripts/download-core.sh "${LOOKSEE_CORE_VERSION}"

      - name: Install core JAR
        run: mvn install:install-file -Dfile=libs/core-${LOOKSEE_CORE_VERSION}.jar -DgroupId=com.looksee -DartifactId=core -Dversion=${LOOKSEE_CORE_VERSION} -Dpackaging=jar
        
  
      - name: Test with Maven
        run: mvn test
        
  build:
    needs: test
    runs-on: ubuntu-latest
    env:
      BRANCH_NAME: ${{ github.head_ref }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Resolve core version
        run: echo "LOOKSEE_CORE_VERSION=$(sed -n 's:.*<looksee-core.version>\(.*\)</looksee-core.version>.*:\1:p' pom.xml | head -n1)" >> "$GITHUB_ENV"

      - name: Build Docker image
        run: |
          docker build --build-arg LOOKSEE_CORE_VERSION=${LOOKSEE_CORE_VERSION} -t deepthought42/page-builder:${{ env.BRANCH_NAME }} .
          docker tag deepthought42/page-builder:${{ env.BRANCH_NAME }} deepthought42/page-builder:latest
